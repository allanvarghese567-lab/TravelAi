name: Deploy Travel AI Platform

on:

  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Docker Hub

        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API Gateway

        uses: docker/build-push-action@v5

        with:
          context: .
          file: apps/api-gateway/Dockerfile
          push: true
          tags: yourdocker/travel-api-gateway:latest

      - name: Build Trip Service

        uses: docker/build-push-action@v5

        with:
          context: .
          file: apps/trip-service/Dockerfile
          push: true
          tags: yourdocker/travel-trip-service:latest

      - name: Deploy To VPS

        uses: appleboy/ssh-action@master

        with:

          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd /opt/travel-ai-platform

            git pull

            docker compose pull

            docker compose up -d --build