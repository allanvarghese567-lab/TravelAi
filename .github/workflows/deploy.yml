name: Render Deploy

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node

        uses: actions/setup-node@v4

        with:
          node-version: 20

      - name: Install Dependencies

        run: npm install

      - name: Build App

        run: npm run build
